services:
  app:
    image: ${CHATGPT2API_IMAGE:-ghcr.io/your-name/chatgpt2api:latest}
    container_name: chatgpt2api
    restart: unless-stopped
    ports:
      - "${CHATGPT2API_PORT:-3000}:80"
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-json}
      DATABASE_URL: ${DATABASE_URL:-}
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY:-}
      CHATGPT2API_BASE_URL: ${CHATGPT2API_BASE_URL:-}
      GIT_PYTHON_REFRESH: quiet
